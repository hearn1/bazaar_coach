<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazaar Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-root:     #0c0e14;
  --bg-panel:    #13161e;
  --bg-card:     #1a1e2a;
  --bg-card-alt: #1e2234;
  --bg-hover:    #242940;
  --border:      #2a2f42;
  --border-lite: #353b52;

  --text-primary:   #e8eaf0;
  --text-secondary: #8b91a8;
  --text-muted:     #5c6280;

  --accent:       #c9a44a;
  --accent-dim:   #a38338;
  --green:        #4ade80;
  --green-bg:     rgba(74, 222, 128, 0.10);
  --green-border: rgba(74, 222, 128, 0.25);
  --red:          #f87171;
  --red-bg:       rgba(248, 113, 113, 0.10);
  --red-border:   rgba(248, 113, 113, 0.25);
  --amber:        #fbbf24;
  --amber-bg:     rgba(251, 191, 36, 0.10);
  --amber-border: rgba(251, 191, 36, 0.25);
  --blue:         #60a5fa;
  --blue-bg:      rgba(96, 165, 250, 0.10);
  --orange:       #f97316;

  --font-display: 'Syne', 'Arial Black', 'Segoe UI', system-ui, sans-serif;
  --font-body: 'DM Sans', 'Helvetica Neue', 'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-mono: 'IBM Plex Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
  --radius: 6px;
}

html { font-size: 14px; }
body {
  font-family: var(--font-body);
  background: var(--bg-root);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
}

.app { max-width: 960px; margin: 0 auto; padding: 20px 20px 60px; }

/* ── Header ──────────────────────────────────────────────────────── */
header {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 14px;
}
header h1 { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
header .subtitle { font-size: 0.8rem; color: var(--text-muted); }
header .history-toggle {
  margin-left: auto; font-size: 0.78rem; color: var(--text-muted);
  cursor: pointer; border: 1px solid var(--border); border-radius: var(--radius);
  padding: 4px 12px; background: transparent; transition: all 0.15s;
}
header .history-toggle:hover { border-color: var(--accent-dim); color: var(--accent); }

/* ── Run Selector (compact history) ──────────────────────────────── */
.run-history { display: none; margin-bottom: 20px; }
.run-history.visible { display: block; }
.run-history h3 {
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px;
}
.run-row {
  display: grid; grid-template-columns: 48px 80px 1fr 90px 72px;
  align-items: center; gap: 6px; padding: 7px 12px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 3px; cursor: pointer;
  transition: background 0.12s, border-color 0.12s; font-size: 0.85rem;
}
.run-row:hover { background: var(--bg-hover); border-color: var(--border-lite); }
.run-row.active { border-color: var(--accent-dim); background: var(--bg-card-alt); }
.run-row .rid { font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted); }
.run-row .hero { font-weight: 600; }
.run-row .arch { font-size: 0.75rem; color: var(--accent); opacity: 0.85; }
.badge {
  display: inline-block; padding: 1px 8px; border-radius: 3px;
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
}
.badge-victory { background: var(--green-bg); color: var(--green); }
.badge-defeat  { background: var(--red-bg); color: var(--red); }
.badge-unknown { background: rgba(255,255,255,0.05); color: var(--text-muted); }
.run-row .pvp { font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-secondary); }

/* ── Insight Callouts (the main value) ───────────────────────────── */
.insight-section { margin-bottom: 20px; }
.insight-section h3 {
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--red); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.insight-section h3 .count-badge {
  background: var(--red-bg); color: var(--red); font-size: 0.7rem;
  padding: 1px 7px; border-radius: 10px; font-weight: 700;
}

.insight-card {
  padding: 10px 14px; margin-bottom: 6px;
  border-radius: var(--radius); border-left: 3px solid;
  background: var(--bg-card); position: relative;
}
.insight-card.sev-high { border-left-color: var(--red); background: var(--red-bg); }
.insight-card.sev-medium { border-left-color: var(--amber); background: var(--amber-bg); }
.insight-card.sev-milestone { border-left-color: var(--green); background: var(--green-bg); }
.insight-card.sev-info { border-left-color: var(--blue); background: var(--blue-bg); }

.insight-card .insight-seq {
  font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted);
}
.insight-card .insight-msg {
  font-size: 0.88rem; color: var(--text-primary); margin-top: 1px;
}
.insight-card .insight-context {
  font-size: 0.78rem; color: var(--text-secondary); margin-top: 3px;
}
.mini-card-art {
  position: relative;
  display: inline-grid;
  place-items: center;
  overflow: hidden;
  flex: 0 0 auto;
  border: 1px solid rgba(201,164,74,0.42);
  background:
    linear-gradient(145deg, rgba(255,236,177,0.16), transparent 34%),
    linear-gradient(180deg, rgba(31,36,52,0.96), rgba(10,12,18,0.96));
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.07),
    0 4px 10px rgba(0,0,0,0.25);
}
.mini-card-art::before {
  content: ''; position: absolute; inset: 3px;
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: inherit; pointer-events: none; z-index: 1;
}
.mini-card-art::after {
  content: ''; position: absolute; inset: auto 0 0; height: 34%;
  background: linear-gradient(180deg, transparent, rgba(0,0,0,0.44));
  pointer-events: none; z-index: 1;
}
.mini-card-art img {
  width: 100%; height: 100%; object-fit: cover; transform: scale(1.08);
}
.insight-img {
  width: 26px; height: 26px; vertical-align: middle;
  border-radius: 5px; margin-right: 6px;
}

/* ── Summary Strip ───────────────────────────────────────────────── */
.summary-strip {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 6px; margin-bottom: 18px;
}
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px; text-align: center;
}
.stat-card .sv {
  font-family: var(--font-mono); font-size: 1.15rem; font-weight: 700;
}
.stat-card .sl {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-muted); margin-top: 1px;
}
.stat-card.accent .sv { color: var(--accent); }

/* ── Filter Tabs ─────────────────────────────────────────────────── */
.filter-row {
  display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap;
}
.ftab {
  font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.7px; padding: 5px 14px; border-radius: var(--radius);
  border: 1px solid var(--border); background: transparent;
  color: var(--text-muted); cursor: pointer; transition: all 0.12s;
}
.ftab:hover { border-color: var(--border-lite); color: var(--text-secondary); }
.ftab.active { border-color: var(--accent-dim); color: var(--accent); background: rgba(201,164,74,0.07); }
.ftab.flag-tab { border-color: var(--red-border); color: var(--red); }
.ftab.flag-tab:hover { background: var(--red-bg); }
.ftab.flag-tab.active { background: var(--red-bg); border-color: var(--red); }

/* ── Decision Timeline ───────────────────────────────────────────── */
.timeline { margin-bottom: 28px; }
.phase-div {
  font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--accent-dim); padding: 10px 0 4px 6px;
  border-bottom: 1px solid var(--border); margin-bottom: 3px;
}

.d-row {
  display: grid; grid-template-columns: 18px 32px 36px 1fr 16px;
  gap: 0 8px; padding: 7px 10px; border-left: 3px solid transparent;
  border-radius: 0 var(--radius) var(--radius) 0; margin-bottom: 2px;
  transition: background 0.1s; cursor: pointer;
}
.d-row:hover { background: var(--bg-hover); }
.d-row.lbl-optimal     { border-left-color: var(--green); }
.d-row.lbl-good        { border-left-color: var(--blue); }
.d-row.lbl-situational { border-left-color: var(--amber); }
.d-row.lbl-suboptimal  { border-left-color: var(--red); }
.d-row.lbl-warning     { border-left-color: var(--orange); }
.d-row.lbl-info        { border-left-color: var(--text-muted); opacity: 0.65; }

/* Flagged decisions get a subtle glow */
.d-row.flagged { background: var(--red-bg); }
.d-row.flagged:hover { background: rgba(248,113,113,0.16); }

.d-row .si { font-size: 0.85rem; line-height: 1.6; }
.d-row .sn { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-muted); text-align: right; line-height: 1.6; }

.d-thumb {
  width: 36px; height: 36px; border-radius: 7px;
  background: var(--bg-card);
  align-self: center;
}

.d-main { display: flex; flex-direction: column; gap: 1px; }
.d-top { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
.d-name { font-weight: 600; font-size: 0.88rem; }
.d-ctx {
  font-size: 0.72rem; color: var(--text-muted); font-family: var(--font-mono);
}
.d-notes { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.4; }

/* Inline insight chips on decision rows */
.d-insights { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px; }
.d-chip {
  font-size: 0.7rem; padding: 2px 8px; border-radius: 3px; font-weight: 500;
}
.chip-high     { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.chip-medium   { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
.chip-milestone{ background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.chip-info     { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(96,165,250,0.25); }

/* Expanded detail */
.d-detail {
  display: none; margin-top: 6px; padding: 8px 10px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
}
.d-row.expanded .d-detail { display: block; }
.det-title {
  font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-muted); margin-bottom: 3px; margin-top: 6px;
}
.det-title:first-child { margin-top: 0; }
.det-items { display: flex; flex-wrap: wrap; gap: 3px; }
.det-itm {
  font-size: 0.75rem; padding: 2px 7px; border-radius: 3px;
  background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text-secondary);
}
.det-itm.chosen { background: rgba(201,164,74,0.10); border-color: var(--accent-dim); color: var(--accent); font-weight: 600; }
.det-itm.rej { opacity: 0.55; }
.det-itm.unres { font-family: var(--font-mono); font-size: 0.68rem; opacity: 0.35; }
.det-img {
  width: 22px; height: 22px; vertical-align: middle;
  border-radius: 5px; margin-right: 4px;
}

/* ── Combats ─────────────────────────────────────────────────────── */
.combat-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 5px; margin-bottom: 20px;
}
.c-card {
  display: flex; align-items: center; gap: 8px; padding: 6px 10px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
}
.c-card .ci { font-size: 0.9rem; }
.c-card .ct { font-size: 0.78rem; color: var(--text-secondary); }
.c-card .cd { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); margin-left: auto; }

/* ── Utility ─────────────────────────────────────────────────────── */
.loading, .empty { text-align: center; padding: 30px; color: var(--text-muted); font-size: 0.85rem; }
.empty-state {
  text-align: center; padding: 24px 18px; color: var(--text-muted);
  font-size: 0.85rem; background: var(--bg-card); border: 1px dashed var(--border);
  border-radius: var(--radius); margin: 8px 0;
}

/* ── Toast ───────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--bg-card-alt); border: 1px solid var(--accent-dim);
  color: var(--accent); font-size: 0.85rem; font-weight: 500;
  padding: 10px 18px; border-radius: var(--radius);
  box-shadow: 0 4px 16px rgba(0,0,0,0.5); z-index: 1000;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.toast.visible { opacity: 1; }

/* ── Decision row chevron (UI-07) ────────────────────────────────── */
.d-chevron {
  font-size: 0.8rem; color: var(--text-muted); align-self: center;
  margin-left: auto; padding: 0 4px;
  transform: rotate(0deg); transition: transform 0.15s ease;
  user-select: none;
}
.d-row.expanded .d-chevron { transform: rotate(180deg); color: var(--accent); }
.loading::after {
  content: ''; display: inline-block; width: 12px; height: 12px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite; margin-left: 6px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.sec-title {
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; margin-top: 20px;
}
::-webkit-scrollbar { width: 7px; }
::-webkit-scrollbar-track { background: var(--bg-root); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.update-notice {
  display: none; align-items: center; gap: 10px; flex-wrap: wrap;
  margin: -8px 0 18px; padding: 10px 12px;
  background: var(--blue-bg); border: 1px solid rgba(96,165,250,0.25);
  border-radius: var(--radius); color: var(--text-primary); font-size: 0.84rem;
}
.update-notice.visible { display: flex; }
.update-notice .release-link { color: var(--blue); text-decoration: none; font-weight: 600; }
.update-notice .release-link:hover { text-decoration: underline; }
.update-notice .dismiss-update {
  margin-left: auto; color: var(--text-secondary); background: transparent;
  border: 1px solid var(--border-lite); border-radius: var(--radius);
  padding: 3px 9px; cursor: pointer; font-size: 0.75rem;
}
.update-notice .dismiss-update:hover { color: var(--text-primary); border-color: var(--blue); }
.update-notice.status-updated {
  background: var(--green-bg); border-color: var(--green-border);
}
.update-notice.status-unchanged {
  background: rgba(255,255,255,0.04); border-color: var(--border-lite);
}
.update-notice.status-failed {
  background: var(--red-bg); border-color: var(--red-border);
}
.update-notice.status-warning {
  background: rgba(201,164,74,0.10); border-color: var(--accent-dim);
}
.build-panel {
  display: none; margin: -6px 0 20px; padding: 12px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: rgba(26,30,42,0.72);
}
.build-panel.visible { display: block; }
body.panel-open #run-view { display: none; }
.build-panel-head {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.build-panel-head h3 {
  font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--accent); margin-right: auto;
}
.build-refresh-btn {
  font-family: var(--font-body); font-size: 0.76rem; font-weight: 600;
  color: var(--accent); background: rgba(201,164,74,0.08);
  border: 1px solid var(--accent-dim); border-radius: var(--radius);
  padding: 5px 12px; cursor: pointer;
}
.build-refresh-btn:hover { background: rgba(201,164,74,0.15); border-color: var(--accent); }
.build-refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.build-status {
  display: none; padding: 8px 10px; margin-bottom: 10px;
  border-radius: var(--radius); border: 1px solid var(--border);
  color: var(--text-secondary); font-size: 0.82rem;
}
.build-status.visible { display: block; }
.build-status.status-updated { color: var(--green); background: var(--green-bg); border-color: var(--green-border); }
.build-status.status-unchanged { color: var(--text-secondary); background: rgba(255,255,255,0.03); border-color: var(--border-lite); }
.build-status.status-failed { color: var(--red); background: var(--red-bg); border-color: var(--red-border); }
.build-notes {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 6px;
}
.build-note {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 9px 10px;
}
.build-note .hero {
  font-weight: 700; color: var(--text-primary); margin-bottom: 2px;
}
.build-note .meta {
  font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-muted);
  margin-bottom: 5px;
}
.build-note .note {
  font-size: 0.78rem; color: var(--text-secondary); line-height: 1.35;
}
.build-refresh-detail {
  border-color: var(--border-lite);
}
.build-refresh-detail .status-skipped { color: var(--red); }
.build-refresh-detail .status-updated { color: var(--green); }
.build-refresh-detail .status-unchanged { color: var(--text-muted); }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>BAZAAR COACH</h1>
    <span class="subtitle" id="header-sub">Loading...</span>
    <button class="history-toggle" id="builds-btn" onclick="toggleBuildPanel()" style="margin-left:auto">Build Data</button>
    <button class="history-toggle" id="my-builds-btn" onclick="toggleMyBuildsPanel()">My Builds</button>
    <button class="history-toggle" id="history-btn" onclick="toggleHistory()">Run History</button>
  </header>
  <div class="toast" id="toast"></div>
  <div class="update-notice" id="update-notice"></div>
  <div class="update-notice" id="build-refresh-notice"></div>
  <div class="update-notice" id="catalog-dashboard-notice"></div>

  <div class="build-panel" id="build-panel">
    <div class="build-panel-head">
      <h3>Build Data</h3>
      <button class="build-refresh-btn" id="refresh-builds-btn" onclick="refreshBuilds()">Refresh Builds</button>
    </div>
    <div class="build-status" id="build-refresh-status"></div>
    <div class="build-notes" id="build-notes"></div>
  </div>

  <div class="build-panel" id="my-builds-panel">
    <div class="build-panel-head">
      <h3>My Builds</h3>
      <select id="my-builds-hero-select" onchange="loadMyBuilds()"></select>
      <button class="build-refresh-btn" id="my-builds-add-btn" onclick="showMyBuildsForm(null)">+ Add Archetype</button>
    </div>
    <div class="build-status" id="my-builds-conflict" style="display:none"></div>
    <div id="my-builds-toggle-row"></div>
    <div id="my-builds-form-area" style="display:none"></div>
    <div id="my-builds-list"></div>
  </div>

  <!-- Run history (hidden by default) -->
  <div class="run-history" id="run-history">
    <h3>Run History</h3>
    <div id="run-list"></div>
  </div>

  <!-- Main content: loaded run -->
  <div id="run-view">
    <div class="loading" id="main-loading">Loading latest run</div>

    <!-- Insight callouts — the first thing you see -->
    <div id="insights-section" style="display:none"></div>

    <!-- Summary -->
    <div class="summary-strip" id="summary-strip" style="display:none"></div>

    <!-- Filters -->
    <div class="filter-row" id="filter-row" style="display:none"></div>

    <!-- Timeline -->
    <div class="timeline" id="timeline"></div>

    <!-- Combats -->
    <div id="combats-section" style="display:none">
      <div class="sec-title">Combats</div>
      <div class="combat-grid" id="combat-grid"></div>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────
let currentRunId = null;
let allDecisions = [];
let allRuns = [];
let activeFilter = 'all';
let currentSummary = null;
let buildRefreshPoll = null;
let buildNoticeDismissed = false;
let currentBuildStatus = null;

const SUPPORTED_BUILD_HEROES = new Set(['dooley', 'karnok', 'mak', 'pygmalien', 'vanessa']);

const ICONS = {
  optimal:'✅', good:'👍', situational:'⚠️', suboptimal:'❌', warning:'🔶', info:'ℹ️',
};
const TYPE_ICONS = {
  item:'🛒', free_reward:'🎁', skip:'⏭', skill:'🔮', event_choice:'🗺', companion:'🐾',
};
const PHASES = { early:'Early', early_mid:'Early Mid', late:'Late' };

// Only these decision types represent real player choices
const CHOICE_TYPES = new Set(['item', 'companion', 'skip', 'skill', 'free_reward', 'event_choice']);
function isChoice(d) { return CHOICE_TYPES.has(d.decision_type); }

// UI-03: Flagged definition MUST match backend's flagged_count contract exactly.
// Backend: score_label IN ('suboptimal','warning') PLUS skips with score_notes LIKE '%missed:%'
// (which the server surfaces as the `skip_has_relevant` boolean on each decision row).
const isFlagged = d => d.score_label === 'suboptimal'
                    || d.score_label === 'warning'
                    || d.skip_has_relevant === true;

async function api(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function checkUpdates() {
  const el = document.getElementById('update-notice');
  if (!el) return;
  try {
    const status = await api('/api/updates/status');
    if (!status.update_available || status.dismissed) return;
    const notes = status.release_notes_url
      ? `<a class="release-link" href="${esc(status.release_notes_url)}" target="_blank" rel="noreferrer">Release notes</a>`
      : '';
    const compat = status.compatibility_notes ? `<span>${esc(status.compatibility_notes)}</span>` : '';
    el.innerHTML = `
      <strong>Update available: ${esc(status.latest_version)}</strong>
      <span>Current: ${esc(status.current_version)}</span>
      ${notes}
      ${compat}
      <button class="dismiss-update" data-version="${esc(status.latest_version)}" onclick="dismissUpdate(this.dataset.version)">Dismiss</button>`;
    el.classList.add('visible');
  } catch(e) {
    // Update checks are intentionally non-blocking.
  }
}

async function dismissUpdate(version) {
  try {
    await fetch('/api/updates/dismiss', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ version }),
    });
  } catch(e) {
    // Ignore dismissal write failures; the notice can return next load.
  }
  const el = document.getElementById('update-notice');
  if (el) el.classList.remove('visible');
}

// Build catalog refresh
function buildRefreshMessage(result) {
  if (!result) return '';
  const counts = `${result.updated || 0} updated, ${result.unchanged || 0} unchanged, ${result.skipped || 0} failed`;
  if (result.status === 'checking') return 'Checking build catalogs...';
  if (result.status === 'updated') return `Build catalogs refreshed: ${counts}.`;
  if (result.status === 'unchanged') return `Build catalogs already current: ${counts}.`;
  if (result.status === 'failed') return `Build refresh failed: ${counts}. Bundled catalogs are still available.`;
  return counts;
}

function incompatibleRefreshResults(result) {
  const results = Array.isArray(result && result.results) ? result.results : [];
  return results.filter(r => {
    const message = String(r.message || '').toLowerCase();
    return r.status === 'skipped'
      && (r.code === 'unsupported_schema'
        || (message.startsWith('validation failed')
          && message.includes('schema_version')
          && message.includes('outside supported range')));
  });
}

function buildPerHeroRefreshMessages(result) {
  const results = Array.isArray(result && result.results) ? result.results : [];
  return results
    .filter(r => r && r.message)
    .map(r => {
      const statusName = r.status || 'unknown';
      const meta = [
        `refresh ${statusName}`,
        r.filename || '',
      ].filter(Boolean).join(' | ');
      return `<div class="build-note build-refresh-detail">
        <div class="hero">${esc(r.hero || '?')}</div>
        <div class="meta">${esc(meta)}</div>
        <div class="note status-${esc(statusName)}">${esc(r.message)}</div>
      </div>`;
    }).join('');
}

function knownBuildHeroKeys(status) {
  const catalogs = Array.isArray(status && status.catalogs) ? status.catalogs : [];
  const keys = catalogs
    .map(c => String(c.hero || '').trim().toLowerCase())
    .filter(Boolean);
  return keys.length ? new Set(keys) : SUPPORTED_BUILD_HEROES;
}

function unknownHeroCatalogMessage(summary, status) {
  const catalogStatus = summary && (summary.catalog_status || summary.build_catalog_status);
  if (catalogStatus && catalogStatus.code === 'unknown_hero') {
    return catalogStatus.message || `No build catalog for ${summary.hero || 'this hero'}.`;
  }
  const hero = summary && String(summary.hero || '').trim();
  if (!hero) return '';
  if (!knownBuildHeroKeys(status).has(hero.toLowerCase())) {
    return `No build catalog for ${hero}. Build-aware scoring is disabled for this run.`;
  }
  return '';
}

function renderCatalogDashboardNotice(summary, status) {
  const el = document.getElementById('catalog-dashboard-notice');
  if (!el) return;
  const message = unknownHeroCatalogMessage(summary, status);
  if (!message) {
    el.classList.remove('visible');
    el.innerHTML = '';
    return;
  }
  el.className = 'update-notice status-warning visible';
  el.innerHTML = `<strong>Build catalog unavailable</strong><span>${esc(message)}</span>`;
}

function renderBuildRefreshNotice(status) {
  const el = document.getElementById('build-refresh-notice');
  if (!el || buildNoticeDismissed) return;
  const result = status && status.last_result;
  if (!result || result.status === 'checking') return;
  const incompatible = incompatibleRefreshResults(result).length > 0;
  el.className = `update-notice status-${result.status}`;
  el.innerHTML = `
    <strong>${esc(incompatible ? 'Incompatible build catalog skipped' : result.status === 'failed' ? 'Build refresh failed' : result.status === 'updated' ? 'Builds refreshed' : 'Builds current')}</strong>
    <span>${esc(incompatible ? 'Refreshed catalog was skipped as incompatible; bundled catalog remains active.' : buildRefreshMessage(result))}</span>
    <button class="dismiss-update" onclick="buildNoticeDismissed=true; document.getElementById('build-refresh-notice').classList.remove('visible')">Dismiss</button>`;
  el.classList.add('visible');
}

function renderBuildPanel(status) {
  const result = status && status.last_result;
  const statusEl = document.getElementById('build-refresh-status');
  const notesEl = document.getElementById('build-notes');
  const btn = document.getElementById('refresh-builds-btn');
  if (btn) btn.disabled = !!(status && status.running);

  if (statusEl) {
    const statusName = result ? result.status : 'unchanged';
    const incompatible = incompatibleRefreshResults(result).length > 0;
    statusEl.className = `build-status visible status-${statusName}`;
    statusEl.textContent = result
      ? `${buildRefreshMessage(result)}${incompatible ? ' Refreshed catalog was skipped as incompatible; bundled catalog remains active.' : ''}`
      : 'Build catalogs are loaded from the bundled install unless refreshed catalogs are present.';
  }

  if (!notesEl) return;
  const catalogs = (status && status.catalogs) || [];
  if (!catalogs.length) {
    notesEl.innerHTML = `${buildPerHeroRefreshMessages(result)}<div class="empty-state">No build catalogs found.</div>`;
    return;
  }
  const refreshMessages = buildPerHeroRefreshMessages(result);
  const catalogCards = catalogs.map(c => {
    const meta = [
      c.last_updated || 'no date',
      c.source || 'unknown source',
      c.season ? `season ${c.season}` : '',
    ].filter(Boolean).join(' | ');
    return `<div class="build-note">
      <div class="hero">${esc(c.hero || '?')}</div>
      <div class="meta">${esc(meta)}</div>
      <div class="note">${esc(c.notes || 'No release notes for this catalog.')}</div>
    </div>`;
  }).join('');
  notesEl.innerHTML = `${refreshMessages}${catalogCards}`;
}

async function loadBuildRefreshStatus({ notify=false } = {}) {
  try {
    const status = await api('/api/builds/refresh/status');
    currentBuildStatus = status;
    renderBuildPanel(status);
    renderCatalogDashboardNotice(currentSummary, status);
    if (notify) renderBuildRefreshNotice(status);
    if (status.running) {
      if (buildRefreshPoll) clearTimeout(buildRefreshPoll);
      buildRefreshPoll = setTimeout(() => loadBuildRefreshStatus({ notify }), 1000);
    }
    return status;
  } catch(e) {
    const statusEl = document.getElementById('build-refresh-status');
    if (statusEl) {
      statusEl.className = 'build-status visible status-failed';
      statusEl.textContent = `Build refresh status unavailable: ${e.message}`;
    }
    renderCatalogDashboardNotice(currentSummary, currentBuildStatus);
    return null;
  }
}

function _refreshPanelOpenClass() {
  const buildOpen = document.getElementById('build-panel')?.classList.contains('visible');
  const myOpen = document.getElementById('my-builds-panel')?.classList.contains('visible');
  document.body.classList.toggle('panel-open', !!(buildOpen || myOpen));
}

function toggleBuildPanel(force) {
  const el = document.getElementById('build-panel');
  if (!el) return;
  const show = typeof force === 'boolean' ? force : !el.classList.contains('visible');
  if (show) toggleMyBuildsPanel(false);
  el.classList.toggle('visible', show);
  document.getElementById('builds-btn').textContent = show ? 'Hide Builds' : 'Build Data';
  _refreshPanelOpenClass();
  if (show) {
    loadBuildRefreshStatus();
    if (location.pathname !== '/builds') history.replaceState(null, '', '/builds');
  } else if (location.pathname === '/builds') {
    history.replaceState(null, '', '/');
  }
}

async function refreshBuilds() {
  const btn = document.getElementById('refresh-builds-btn');
  if (btn) btn.disabled = true;
  buildNoticeDismissed = false;
  try {
    const response = await fetch('/api/builds/refresh', { method: 'POST' });
    if (!response.ok) throw new Error(`${response.status}`);
    const status = await response.json();
    renderBuildPanel(status);
    renderBuildRefreshNotice(status);
    loadBuildRefreshStatus({ notify: true });
    checkMyBuildsConflicts();
  } catch(e) {
    const statusEl = document.getElementById('build-refresh-status');
    if (statusEl) {
      statusEl.className = 'build-status visible status-failed';
      statusEl.textContent = `Build refresh failed to start: ${e.message}`;
    }
    if (btn) btn.disabled = false;
  }
}

function toggleMyBuildsPanel(force) {
  const el = document.getElementById('my-builds-panel');
  if (!el) return;
  const show = typeof force === 'boolean' ? force : !el.classList.contains('visible');

function populateMyBuildsHeroSelect() {
  const sel = document.getElementById('my-builds-hero-select');
  if (!sel) return;
  const heroes = Array.from(knownBuildHeroKeys(currentBuildStatus));
  const current = sel.value;
  sel.innerHTML = heroes.map(h =>
    `<option value="${esc(h)}"${h === current ? ' selected' : ''}>${esc(h.charAt(0).toUpperCase() + h.slice(1))}</option>`
  ).join('');
}

async function loadMyBuilds() {
  const sel = document.getElementById('my-builds-hero-select');
  const hero = sel ? sel.value : '';
  if (!hero) return;
  try {
    const data = await api(`/api/builds/user/${encodeURIComponent(hero)}`);
    renderMyBuilds(data);
  } catch(e) {
    const listEl = document.getElementById('my-builds-list');
    if (listEl) listEl.innerHTML = `<div class="build-status visible status-failed">Failed to load user builds: ${esc(e.message)}</div>`;
  }
}

function _myBuildsArchetypes(data) {
  // Defensively gather archetypes from both phases
  const catalog = (data && data.catalog) || {};
  const phases = (catalog.game_phases) || {};
  const em = (phases.early_mid && phases.early_mid.archetypes) || [];
  const late = (phases.late && phases.late.archetypes) || [];
  return { early_mid: em, late };
}

function _provenanceBadge(archetype, data) {
  const prov = (data && data.provenance) || {};
  let isUser = false;
  if (Array.isArray(prov.user_archetype_names)) {
    isUser = prov.user_archetype_names.includes(archetype.name);
  } else {
    isUser = prov.source === 'user_builds' || prov.user_file_exists === true;
  }
  return isUser
    ? `<span class="badge badge-victory">user</span>`
    : `<span class="badge badge-unknown">catalog</span>`;
}

function renderMyBuilds(data) {
  const listEl = document.getElementById('my-builds-list');
  const toggleRow = document.getElementById('my-builds-toggle-row');
  if (!listEl) return;

  const { early_mid, late } = _myBuildsArchetypes(data);
  const prov = (data && data.provenance) || {};
  const enabled = prov.user_file_enabled !== false;

  if (toggleRow) {
    toggleRow.innerHTML = prov.user_file_exists
      ? `<div style="margin-bottom:8px;font-size:0.8rem;color:var(--text-secondary)">
           User catalog: <strong style="color:var(--text-primary)">${esc(prov.filename || '')}</strong>
           &nbsp;|&nbsp; Last updated: ${esc(prov.last_updated || 'unknown')}
           &nbsp;|&nbsp;
           <button class="build-refresh-btn" onclick="toggleMyBuildsEnabled(${!enabled})">${enabled ? 'Disable' : 'Enable'}</button>
         </div>`
      : `<div style="margin-bottom:8px;font-size:0.8rem;color:var(--text-muted)">No user catalog file yet. Add an archetype to create one.</div>`;
  }

  if (!early_mid.length && !late.length) {
    listEl.innerHTML = '<div class="empty-state" style="padding:10px 0">No archetypes found. Click "+ Add Archetype" to create one.</div>';
    return;
  }

  function archetypeRow(arch, phase) {
    const itemCount = [
      (arch.carry_items || []).length,
      (arch.support_items || []).length,
      (arch.core_items || []).length,
      (arch.condition_items || []).length,
    ];
    const badge = _provenanceBadge(arch, data);
    const phaseLbl = phase === 'early_mid' ? 'Early Mid' : 'Late';
    return `<div class="build-note" style="margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-weight:700;color:var(--text-primary)">${esc(arch.name || '?')}</span>
        ${badge}
        <span class="badge badge-unknown">${esc(phaseLbl)}</span>
        ${arch.timing_profile ? `<span class="badge badge-unknown">${esc(arch.timing_profile)}</span>` : ''}
        <span style="margin-left:auto;font-size:0.72rem;color:var(--text-muted)">
          carry:${itemCount[0]} support:${itemCount[1]}${itemCount[2] ? ` core:${itemCount[2]}` : ''}
        </span>
      </div>
      <div style="display:flex;gap:6px">
        <button class="build-refresh-btn" onclick='showMyBuildsForm(${JSON.stringify(Object.assign({}, arch, {_phase: phase}))})'>Edit</button>
        <button class="build-refresh-btn" onclick="deleteMyBuildsArchetype(${JSON.stringify(arch.name)})">Delete</button>
      </div>
    </div>`;
  }

  let html = '';
  if (early_mid.length) {
    html += `<div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin:8px 0 4px">Early Mid</div>`;
    html += early_mid.map(a => archetypeRow(a, 'early_mid')).join('');
  }
  if (late.length) {
    html += `<div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin:8px 0 4px">Late</div>`;
    html += late.map(a => archetypeRow(a, 'late')).join('');
  }
  listEl.innerHTML = html;
}

function _splitItems(str) {
  return String(str || '').split(',').map(s => s.trim()).filter(Boolean);
}

async function submitMyBuildsForm() {
  const errEl = document.getElementById('my-builds-form-error');
  function showErr(msg) {
    if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; }
  }
  if (errEl) errEl.style.display = 'none';

  const name = (document.getElementById('mbf-name') || {}).value || '';
  const phase = (document.getElementById('mbf-phase') || {}).value || '';
  const carry_items = _splitItems((document.getElementById('mbf-carry_items') || {}).value);
  const support_items = _splitItems((document.getElementById('mbf-support_items') || {}).value);

  if (!name.trim()) { showErr('Name is required.'); return; }
  if (!phase) { showErr('Phase is required.'); return; }
  if (!carry_items.length) { showErr('Carry items are required.'); return; }
  if (!support_items.length) { showErr('Support items are required.'); return; }

  const archetype = {
    name: name.trim(),
    phase,
    carry_items,
    support_items,
    core_items: _splitItems((document.getElementById('mbf-core_items') || {}).value),
    condition_items: _splitItems((document.getElementById('mbf-condition_items') || {}).value),
    timing_profile: (document.getElementById('mbf-timing_profile') || {}).value || undefined,
    notes: ((document.getElementById('mbf-notes') || {}).value || '').trim() || undefined,
  };
  // Drop undefined keys
  Object.keys(archetype).forEach(k => archetype[k] === undefined && delete archetype[k]);

  const sel = document.getElementById('my-builds-hero-select');
  const hero = sel ? sel.value : '';
  if (!hero) { showErr('No hero selected.'); return; }

  try {
    const resp = await fetch(`/api/builds/user/${encodeURIComponent(hero)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ archetype }),
    });
    const data = await resp.json();
    if (!resp.ok || !data.ok) {
      const msgs = Array.isArray(data.errors) && data.errors.length ? data.errors.join('; ') : `Error ${resp.status}`;
      showErr(msgs);
      return;
    }
    document.getElementById('my-builds-form-area').style.display = 'none';
    renderMyBuilds(data);
  } catch(e) {
    showErr(`Save failed: ${e.message}`);
  }
}

async function deleteMyBuildsArchetype(name) {
  if (!confirm(`Delete archetype "${name}"?`)) return;
  const sel = document.getElementById('my-builds-hero-select');
  const hero = sel ? sel.value : '';
  if (!hero) return;
  try {
    const resp = await fetch(`/api/builds/user/${encodeURIComponent(hero)}/${encodeURIComponent(name)}`, {
      method: 'DELETE',
    });
    const data = await resp.json();
    if (!resp.ok || !data.ok) {
      showToast(`Delete failed: ${Array.isArray(data.errors) ? data.errors.join('; ') : resp.status}`);
      return;
    }
    renderMyBuilds(data);
  } catch(e) {
    showToast(`Delete failed: ${e.message}`);
  }
}

async function toggleMyBuildsEnabled(enabled) {
  const sel = document.getElementById('my-builds-hero-select');
  const hero = sel ? sel.value : '';
  if (!hero) return;
  const action = enabled ? 'enable' : 'disable';
  try {
    const resp = await fetch(`/api/builds/user/${encodeURIComponent(hero)}/${action}`, { method: 'POST' });
    if (!resp.ok) throw new Error(`${resp.status}`);
    loadMyBuilds();
  } catch(e) {
    showToast(`Toggle failed: ${e.message}`);
  }
}

async function checkMyBuildsConflicts() {
  const conflictEl = document.getElementById('my-builds-conflict');
  if (!conflictEl) return;
  const sel = document.getElementById('my-builds-hero-select');
  const hero = sel ? sel.value : '';
  if (!hero) return;
  try {
    const data = await api(`/api/builds/user/${encodeURIComponent(hero)}`);
    const prov = (data && data.provenance) || {};
    let userNames, refreshedNames;

    if (Array.isArray(prov.user_archetype_names) && Array.isArray(prov.refreshed_archetype_names)) {
      userNames = new Set(prov.user_archetype_names);
      refreshedNames = prov.refreshed_archetype_names;
    } else {
      // Fall back: derive from merged catalog when provenance lists are absent.
      const catalog = (data && data.catalog) || {};
      const phases = catalog.game_phases || {};
      const em = (phases.early_mid && phases.early_mid.archetypes) || [];
      const late = (phases.late && phases.late.archetypes) || [];
      const all = [...em, ...late];
      userNames = new Set();
      refreshedNames = [];
      if (prov.source === 'user_builds' || prov.user_file_exists) {
        all.forEach(a => userNames.add(a.name));
      } else {
        all.forEach(a => refreshedNames.push(a.name));
      }
    }

    const conflicts = refreshedNames.filter(n => userNames.has(n));
    if (conflicts.length) {
      conflictEl.style.display = 'block';
      conflictEl.className = 'build-status visible status-failed';
      conflictEl.textContent = `Name conflict with refreshed catalog: ${conflicts.join(', ')}. Consider renaming your archetypes.`;
    } else {
      conflictEl.style.display = 'none';
      conflictEl.className = 'build-status';
    }
  } catch(e) {
    // Silently ignore — conflict check is best-effort
  }
}

// Boot: auto-load latest run
async function boot() {
  checkUpdates();
  if (location.pathname === '/builds') toggleBuildPanel(true);
  if (location.pathname === '/my-builds') toggleMyBuildsPanel(true);
  loadBuildRefreshStatus({ notify: true });
  try {
    allRuns = await api('/api/runs');
    if (!allRuns.length) {
      document.getElementById('main-loading').outerHTML =
        '<div class="empty-state">No runs recorded yet. Start a game and run coach.py.</div>';
      return;
    }
    renderRunList();
    await loadRun(allRuns[0].id);
  } catch(e) {
    document.getElementById('main-loading').innerHTML =
      `<div class="empty-state">Error loading data: ${esc(e.message)}</div>`;
  }
}

// ── Run list (hidden panel) ──────────────────────────────────────
function renderRunList() {
  const list = document.getElementById('run-list');
  if (!allRuns.length) {
    // UI-05: consistent empty state
    list.innerHTML = '<div class="empty-state">No runs recorded yet. Start a game and run coach.py.</div>';
    return;
  }
  list.innerHTML = allRuns.map(r => {
    const bc = r.outcome === 'victory' ? 'badge-victory' : r.outcome === 'defeat' ? 'badge-defeat' : 'badge-unknown';
    const arch = r.archetype ? `<span class="arch">${r.archetype}</span>` : '';
    return `<div class="run-row${r.id === currentRunId ? ' active' : ''}" onclick="loadRun(${r.id})" data-rid="${r.id}">
      <span class="rid">#${r.id}</span>
      <span class="hero">${r.hero || '?'}</span>
      <span>${arch}</span>
      <span class="badge ${bc}">${r.outcome || '...'}</span>
      <span class="pvp">${r.pvp_wins}W/${r.pvp_losses}L</span>
    </div>`;
  }).join('');
}

function toggleHistory() {
  const el = document.getElementById('run-history');
  el.classList.toggle('visible');
  document.getElementById('history-btn').textContent =
    el.classList.contains('visible') ? 'Hide History' : 'Run History';
}

// ── Load a run ───────────────────────────────────────────────────
async function loadRun(runId) {
  currentRunId = runId;
  document.getElementById('main-loading').style.display = 'block';

  // Update active state in history
  document.querySelectorAll('.run-row').forEach(el =>
    el.classList.toggle('active', +el.dataset.rid === runId));

  const [summary, decisions, combats] = await Promise.all([
    api(`/api/runs/${runId}/summary`),
    api(`/api/runs/${runId}/decisions`),
    api(`/api/runs/${runId}/combats`),
  ]);
  allDecisions = decisions;
  currentSummary = summary;
  activeFilter = 'all';

  document.getElementById('main-loading').style.display = 'none';
  document.getElementById('header-sub').textContent =
    `Run #${runId} · ${summary.hero || 'Unknown'} · ${(summary.outcome || 'in progress').toUpperCase()}`;

  renderInsights(decisions, summary);
  renderSummary(summary, decisions);
  renderFilters(decisions, summary);
  renderTimeline(decisions, 'all');
  renderCombats(combats);
  renderCatalogDashboardNotice(summary, currentBuildStatus);

  // Close history panel
  document.getElementById('run-history').classList.remove('visible');
  document.getElementById('history-btn').textContent = 'Run History';
}

// ── Insights Section (the VALUE) ─────────────────────────────────
function renderInsights(decisions, summary) {
  const section = document.getElementById('insights-section');

  // Collect all high/medium insights across CHOICE decisions only
  const flags = [];
  for (const d of decisions) {
    if (!isChoice(d)) continue;
    if (!d.insights || !d.insights.length) continue;
    for (const ins of d.insights) {
      if (ins.severity === 'high' || ins.severity === 'medium' || ins.severity === 'milestone') {
        flags.push({ ...ins, seq: d.seq, item_name: d.item_name, decision_type: d.decision_type, phase: d.phase, chosen_image: d.chosen_image });
      }
    }
  }

  if (!flags.length) {
    section.style.display = 'none';
    return;
  }

  // Sort: high first, then medium, then milestones
  const sevOrder = { high: 0, medium: 1, milestone: 2 };
  flags.sort((a, b) => (sevOrder[a.severity] ?? 9) - (sevOrder[b.severity] ?? 9));

  const highCount = flags.filter(f => f.severity === 'high').length;

  let html = `<div class="insight-section">
    <h3>
      ${highCount > 0 ? '🚨' : '📋'} Key Moments
      ${highCount > 0 ? `<span class="count-badge">${highCount} issue${highCount > 1 ? 's' : ''}</span>` : ''}
    </h3>`;

  for (const f of flags) {
    const phaseLabel = PHASES[f.phase] || f.phase || '';
    const typeIcon = TYPE_ICONS[f.decision_type] || '';
    const nameDisplay = f.decision_type === 'skip' ? 'Skipped shop' : f.item_name;
    const imgHtml = f.chosen_image
      ? `<span class="mini-card-art insight-img"><img src="${f.chosen_image}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'"></span>`
      : '';
    html += `
      <div class="insight-card sev-${f.severity}">
        <div class="insight-seq">#${f.seq} · ${phaseLabel} · ${typeIcon} ${f.decision_type}</div>
        <div class="insight-msg">${esc(f.message)}</div>
        <div class="insight-context">${imgHtml}${esc(nameDisplay)}</div>
      </div>`;
  }

  html += '</div>';
  section.innerHTML = html;
  section.style.display = 'block';
}

// ── Summary ──────────────────────────────────────────────────────
function renderSummary(s, decisions) {
  const strip = document.getElementById('summary-strip');
  const pvpPct = (s.pvp_wins + s.pvp_losses) > 0
    ? Math.round(s.pvp_wins / (s.pvp_wins + s.pvp_losses) * 100) : 0;
  // UI-04: render clean em-dash when archetype is null (backend must return null, not placeholder string)
  const hasArchetype = !!s.archetype;
  const arch = hasArchetype ? s.archetype : '—';
  const commitAt = s.archetype_committed_at ? `#${s.archetype_committed_at}` : '—';
  const choiceCount = decisions.filter(isChoice).length;

  strip.innerHTML = `
    <div class="stat-card"><div class="sv">${s.pvp_wins}W / ${s.pvp_losses}L</div><div class="sl">PvP (${pvpPct}%)</div></div>
    <div class="stat-card"><div class="sv">${s.pve_wins||0}W / ${s.pve_losses||0}L</div><div class="sl">PvE</div></div>
    <div class="stat-card"><div class="sv">${choiceCount}</div><div class="sl">Decisions</div></div>
    <div class="stat-card accent"><div class="sv">${esc(arch)}</div><div class="sl">Archetype</div></div>
    ${hasArchetype ? `<div class="stat-card accent"><div class="sv">${commitAt}</div><div class="sl">Committed</div></div>` : ''}
    ${s.flagged_count ? `<div class="stat-card"><div class="sv" style="color:var(--red)">${s.flagged_count}</div><div class="sl">Flagged</div></div>` : ''}
  `;
  strip.style.display = 'grid';
}


// ── Filter Tabs ──────────────────────────────────────────────────
function renderFilters(decisions, summary) {
  const row = document.getElementById('filter-row');
  const trackedDecisions = decisions.filter(isChoice);
  const phases = new Set(trackedDecisions.map(d=>d.phase).filter(Boolean));
  // UI-03: use the shared isFlagged() so this count matches summary.flagged_count exactly.
  const flaggedCount = trackedDecisions.filter(isFlagged).length;

  let html = `<button class="ftab active" onclick="setFilter('all',this)">All (${trackedDecisions.length})</button>`;
  for (const p of ['early','early_mid','late']) {
    if (phases.has(p)) {
      html += `<button class="ftab" onclick="setFilter('${p}',this)">${PHASES[p]} (${trackedDecisions.filter(d=>d.phase===p).length})</button>`;
    }
  }
  if (flaggedCount) {
    html += `<button class="ftab flag-tab" onclick="setFilter('flagged',this)">⚠ Flagged (${flaggedCount})</button>`;
  }
  row.innerHTML = html;
  row.style.display = 'flex';
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderTimeline(allDecisions, filter);
}

// ── Timeline ─────────────────────────────────────────────────────
function renderTimeline(decisions, filter) {
  const el = document.getElementById('timeline');

  let trackedDecisions = decisions.filter(isChoice);

  let filtered;
  if (filter === 'flagged') {
    // UI-03: use shared isFlagged() so this matches the filter badge and backend flagged_count.
    filtered = trackedDecisions.filter(isFlagged);
  } else if (filter !== 'all') {
    filtered = trackedDecisions.filter(d => d.phase === filter);
  } else {
    filtered = trackedDecisions;
  }

  if (!filtered.length) {
    // UI-05: consistent empty state styling
    const msg = filter === 'all'
      ? 'No tracked decisions to show.'
      : 'No decisions match this filter.';
    el.innerHTML = `<div class="empty-state">${msg}</div>`;
    return;
  }

  let html = '';
  let lastPhase = null;

  for (const d of filtered) {
    // Hide skips unless they contained build-relevant items

    // Hide buys of unresolved items with no scoring notes — no learning value

    if (filter === 'all' && d.phase !== lastPhase) {
      lastPhase = d.phase;
      html += `<div class="phase-div">${PHASES[d.phase]||d.phase}</div>`;
    }

    const icon = ICONS[d.score_label] || TYPE_ICONS[d.decision_type] || '.';
    const lblCls = d.score_label ? `lbl-${d.score_label}` : '';
    // UI-03: use shared isFlagged() — matches backend flagged_count contract.
    const flagCls = isFlagged(d) ? ' flagged' : '';

    let name = d.item_name || '(unknown)';
    const unres = name.startsWith('itm_') || name.startsWith('enc_') || name.startsWith('skl_');
    if (unres) name = `[${name.slice(0,12)}…]`;

    // For skips, show the build-relevant items that were passed on
    if (d.decision_type === 'skip' && d.skip_relevant_items && d.skip_relevant_items.length) {
      name = 'Skipped: ' + d.skip_relevant_items.join(', ');
    }

    const ctx = [];
    if (d.day != null) ctx.push(`D${d.day}`);
    if (d.gold != null) ctx.push(`${d.gold}g`);
    if (d.health != null) ctx.push(`${d.health}hp`);

    let notes = d.score_notes || '';

    // Build insight chips
    let chips = '';
    if (d.insights && d.insights.length) {
      chips = '<div class="d-insights">' +
        d.insights.map(i => `<span class="d-chip chip-${i.severity}">${esc(i.message)}</span>`).join('') +
        '</div>';
    }

    const thumbHtml = d.chosen_image
      ? `<span class="mini-card-art d-thumb"><img src="${d.chosen_image}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'"></span>`
      : '<span class="d-thumb" style="visibility:hidden"></span>';
    html += `<div class="d-row ${lblCls}${flagCls}" onclick="this.classList.toggle('expanded')">
      <span class="si">${icon}</span>
      <span class="sn">#${d.seq}</span>
      ${thumbHtml}
      <div class="d-main">
        <div class="d-top">
          <span class="d-name">${esc(name)}</span>
          ${ctx.length ? `<span class="d-ctx">${ctx.join(' · ')}</span>` : ''}
        </div>
        ${notes && !notes.startsWith('{') ? `<div class="d-notes">${esc(notes)}</div>` : ''}
        ${chips}
        <div class="d-detail">${detailPanel(d)}</div>
      </div>
      <span class="d-chevron" aria-hidden="true">&#9662;</span>
    </div>`;
  }
  el.innerHTML = html || '<div class="empty-state">No tracked decisions to show.</div>';
}

function detailPanel(d) {
  let html = '';
  const offered = d.offered || [];
  const rejected = d.rejected || [];

  const offeredImages = d.offered_images || [];
  if (offered.length) {
    html += `<div class="det-title">Offered (${offered.length})</div><div class="det-items">`;
    for (let i = 0; i < offered.length; i++) {
      const n = offered[i];
      const img = offeredImages[i];
      const ch = n === d.item_name;
      const rj = rejected.includes(n);
      const un = n.startsWith('itm_') || n.startsWith('enc_') || n.startsWith('skl_');
      const cls = ch ? 'chosen' : rj ? 'rej' : '';
      const imgHtml = img
        ? `<span class="mini-card-art det-img"><img src="${img}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'"></span>`
        : '';
      html += `<span class="det-itm ${cls}${un?' unres':''}">${imgHtml}${esc(un ? n.slice(0,12)+'…' : n)}</span>`;
    }
    html += '</div>';
  }

  const resolvedRej = rejected.filter(n => !n.startsWith('itm_') && !n.startsWith('enc_') && !n.startsWith('skl_'));
  if (resolvedRej.length) {
    html += `<div class="det-title">Passed On</div><div class="det-items">`;
    for (const n of resolvedRej) html += `<span class="det-itm rej">${esc(n)}</span>`;
    html += '</div>';
  }

  if (d.game_state) {
    html += `<div class="det-title">State</div><div style="font-size:0.72rem;color:var(--text-muted)">${d.game_state}</div>`;
  }
  return html || '<div style="font-size:0.75rem;color:var(--text-muted)">No detail available.</div>';
}

// ── Combats ──────────────────────────────────────────────────────
function renderCombats(combats) {
  const sec = document.getElementById('combats-section');
  const grid = document.getElementById('combat-grid');
  // UI-05: always show the section with a consistent empty state when there are no combats.
  sec.style.display = 'block';
  if (!combats.length) {
    grid.innerHTML = '';
    grid.style.display = 'none';
    // Replace/insert an empty-state after the section title.
    let empty = sec.querySelector('.empty-state');
    if (!empty) {
      empty = document.createElement('div');
      empty.className = 'empty-state';
      sec.appendChild(empty);
    }
    empty.textContent = 'No combat data recorded for this run.';
    return;
  }
  // Remove any leftover empty state when data arrives.
  const empty = sec.querySelector('.empty-state');
  if (empty) empty.remove();
  grid.style.display = 'grid';
  grid.innerHTML = combats.map(c => {
    const w = c.outcome === 'opponent_died';
    const t = (c.combat_type || 'pve').toUpperCase();
    return `<div class="c-card">
      <span class="ci">${w?'✅':'❌'}</span>
      <span class="ct">${t} ${w?'WIN':'LOSS'}</span>
      <span class="cd">${c.duration_secs ? c.duration_secs.toFixed(1)+'s' : ''}</span>
    </div>`;
  }).join('');
}

// ── Toast helper ─────────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg, ms=2200) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('visible');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('visible'), ms);
}

// ── Init ─────────────────────────────────────────────────────────
boot();
</script>
